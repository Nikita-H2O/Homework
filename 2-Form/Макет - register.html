<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="./Styles/Style.css">
</head>

<body>
    <main>
        <h1>Регистрация</h1>
        <span>Уже есть аккаунт?</span>
        <a href="#">Войти</a>
        <form action="#" method="get">
            <input type="text" name="company" id="company" placeholder="Название компании"
                title="Нужно ввести название компании" required>
            <div>
                <input type="text" name="first name" id="first name" placeholder="Имя" title="Нужно ввести имя"
                    required>
                <input type="text" name="last name" id="last name" placeholder="Фамилия" title="Нужно ввести фамилию"
                    required>
            </div>
            <div>
                <input type="email" name="email" id="email" placeholder="E-mail" title="Нужно ввести E-mail" required>
            </div>
            <button type="submit">Зарегистрироваться</button>
            <div>
                <input type="checkbox" name="politic" id="politic"
                    title="Нужно прочитать и принять условия использования" required> <span class="terms">Я прочитал и
                    принимаю</span>
                <a href="#" target="_blank" class="usloviya">Условия использования</a>
            </div>
        </form>
    </main>
</body>

</html>
